<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renox Numbers | Global Shop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="glass-container">
    <header>
        <h1 id="logo" onclick="secretAdminTap()">Renox <span class="accent">Numbers</span></h1>
        <div id="adminIndicator" class="admin-badge">Admin Mode Active</div>
    </header>

    <section id="adminPanel" class="admin-section">
        <div class="form-card">
            <h3>Boshqaruv Paneli</h3>
            <div class="form-grid">
                <input type="text" id="country" placeholder="Davlat nomi">
                <input type="text" id="phone" placeholder="Telefon raqam">
                <input type="text" id="price" placeholder="Narxi">
                <select id="status">
                    <option value="Spamsiz">Spamsiz</option>
                    <option value="Spam">Spam</option>
                </select>
                <button class="btn-primary" id="actionBtn" onclick="handleAction()">Saqlash</button>
            </div>
        </div>
    </section>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Davlat</th>
                    <th>Raqam</th>
                    <th>Holati</th>
                    <th>Narxi</th>
                    <th>Sotib olish</th>
                </tr>
            </thead>
            <tbody id="dataTable">
                </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
