<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renox Numbers | Premium Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="liquid-bg"></div>
    
    <header class="glass-header">
        <div class="logo">Renox<span>Numbers</span></div>
        <div class="auth-controls">
            <button id="profileBtn" class="glass-btn" onclick="toggleProfile()">👤 Profil</button>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Virtual Raqamlar Olami</h1>
            <p>Telegram va boshqa xizmatlar uchun spamsiz raqamlar</p>
        </section>
        
        <div id="numbersGrid" class="numbers-grid">
            <div class="loading">Raqamlar yuklanmoqda...</div>
        </div>
    </main>

    <div id="profileModal" class="modal">
        <div class="liquid-glass-modal">
            <div id="authSection">
                <h2>Kirish</h2>
                <p>Botga yuborgan raqamingizni kiriting:</p>
                <input type="text" id="userPhoneInput" placeholder="+998901234567" class="glass-input">
                <button class="action-btn" onclick="loginUser()">Kirish</button>
            </div>

            <div id="profileSection" style="display: none;">
                <h2 id="welcomeUser">Salom!</h2>
                <div class="promo-card">
                    <h3>🎁 Mening Promokodlarim</h3>
                    <div id="promoList" class="promo-list"></div>
                </div>
                <button class="danger-btn" onclick="logout()">Chiqish</button>
            </div>
            <button class="close-btn" onclick="toggleProfile()">Yopish</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
